        type="checkbox"
        id="theme-toggle"
        role="switch"
        aria-label="Dark mode"
      /><label for="theme-toggle" class="theme-toggle"
        >[mode=<span class="theme-show-light theme-value">light</span

        >[^]</a

    </div>
    <script>
      (function () {
        var t = document.getElementById("theme-toggle"),
          d = window.matchMedia("(prefers-color-scheme:dark)").matches,
          s = localStorage.getItem("newtrick-theme");
        if (s) t.checked = (s === "dark") !== d;
        t.addEventListener("change", function () {
          s = t.checked !== d ? "dark" : "light";
          localStorage.setItem("newtrick-theme", s);
          document.documentElement.setAttribute("data-theme", s);
        });
      })();
    </script>
